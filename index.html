<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Góc Kỷ Niệm • Photo Booth</title>
    <style>
        :root {
            --bg: #f8f7ff;
            --surface: #ffffff;
            --primary: #8b5cf6;
            --primary-soft: #a78bfa;
            --accent: #f0abfc;
            --text: #4a4a6a;
            --text-light: #7c7c9a;
            --border: #e9e8f5;
            --shadow-sm: 0 2px 12px rgba(139, 92, 246, 0.08);
            --shadow: 0 8px 30px rgba(139, 92, 246, 0.12);
            --radius: 22px;
            --radius-sm: 14px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --mint: #a7f3d0;
            --peach: #fbcfe8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: linear-gradient(145deg, #ede9fe 0%, #f5f3ff 50%, #fdf2f8 100%);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }
        @media (min-width: 768px) {
            #app {
                border-radius: 32px;
                height: 92vh;
                margin-top: 2vh;
            }
        }

        /* header */
        #header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span {
            font-size: 1.6rem;
        }
        .donate-badge {
            font-size: 0.65rem;
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 16px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* camera view */
        #camera-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1e1b2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            border-radius: 20px 20px 0 0;
        }
        video,
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #preview-canvas {
            pointer-events: none;
        }
        #beauty-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(6px);
        }
        #beauty-indicator.active {
            opacity: 1;
        }
        #flash {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.04s;
        }
        #flash.fire {
            opacity: 1;
            transition: opacity 0s;
        }
        #countdown-overlay {
            position: absolute;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        #countdown-overlay.active {
            opacity: 1;
        }
        #countdown-number {
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 60px rgba(139, 92, 246, 0.8);
            animation: countBounce 0.6s ease-out;
        }
        @keyframes countBounce {
            0% {
                transform: scale(2.5);
                opacity: 0;
            }
            40% {
                transform: scale(0.9);
                opacity: 1;
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        #progress-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 6;
            pointer-events: none;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transition: 0.3s;
        }
        .dot.done {
            background: #fff;
        }
        .dot.current {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        /* sidebar ảnh chụp */
        #photo-sidebar {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 15;
            max-height: 80%;
            overflow-y: auto;
            padding: 0 4px;
        }
        .sidebar-thumb {
            position: relative;
            width: 60px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }
        .sidebar-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sidebar-thumb .retake-icon {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            line-height: 1;
        }

        /* controls */
        #controls {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 16px 16px calc(16px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.02);
        }
        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-weight: 600;
            transition: var(--transition);
            border-radius: 20px;
            font-size: 0.8rem;
            padding: 8px 14px;
            background: #f4f2ff;
            color: var(--text);
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-main {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: #fff;
            padding: 14px 40px;
            font-size: 1rem;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-outline {
            background: #fff;
            border: 2px solid #e9e8f5;
            color: var(--text);
            box-shadow: none;
        }
        .btn-outline.active {
            border-color: var(--primary-soft);
            background: #f5f3ff;
            color: var(--primary);
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 0;
            font-size: 1.2rem;
            background: #fff;
            box-shadow: var(--shadow-sm);
        }
        select {
            border: 2px solid #e9e8f5;
            border-radius: 16px;
            padding: 6px 12px;
            font-family: var(--font);
            font-weight: 500;
            background: #fff;
            color: var(--text);
            outline: none;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* panels */
        .panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            z-index: 25;
            padding: 20px 16px calc(20px + var(--safe-bottom));
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.08);
            transform: translateY(105%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 55vh;
            overflow-y: auto;
        }
        .panel.open {
            transform: translateY(0);
        }
        .panel h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .grid.small {
            grid-template-columns: repeat(5, 1fr);
        }
        .grid-item {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            background-color: #f4f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .grid-item.selected {
            border-color: var(--primary-soft);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }
        .grid-item .check {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .grid-item.selected .check {
            opacity: 1;
        }

        /* result modal */
        #result-modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(30, 27, 46, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }
        #result-modal.open {
            opacity: 1;
            pointer-events: auto;
        }
        #result-modal img {
            max-width: 90vw;
            max-height: 55vh;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        #result-modal .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #result-modal button {
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font);
            font-size: 0.9rem;
        }
        .btn-download {
            background: var(--primary);
            color: #fff;
        }
        .btn-retake {
            background: #fff;
            color: var(--text);
        }
        .btn-close {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* history */
        #history-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            z-index: 30;
            padding: 20px 16px calc(20px + var(--safe-bottom));
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.08);
            transform: translateY(105%);
            transition: transform 0.35s;
            max-height: 60vh;
            overflow-y: auto;
        }
        #history-panel.open {
            transform: translateY(0);
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .history-item {
            aspect-ratio: 3/4;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #f4f2ff;
            border: 2px solid transparent;
        }
        .history-item:hover {
            border-color: var(--primary-soft);
        }
        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .history-item .del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(239, 68, 68, 0.9);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 0.7rem;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 22;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        #overlay-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #4a4a6a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 99;
            font-weight: 500;
            font-size: 0.85rem;
            transition: transform 0.35s;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .sticker-on-photo,
        .text-on-photo {
            position: absolute;
            cursor: grab;
            z-index: 8;
            pointer-events: auto;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }
        .sticker-on-photo:active,
        .text-on-photo:active {
            cursor: grabbing;
        }
        .delete-sticker {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div id="header">
            <div class="logo"><span>📷</span> Góc Kỷ Niệm</div>
            <div class="donate-badge">💜 donate: 0915779767 (MB BANK)</div>
        </div>

        <!-- Camera -->
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="preview-canvas"></canvas>
            <div id="beauty-indicator">✨ Làm đẹp</div>
            <div id="flash"></div>
            <div id="countdown-overlay"><div id="countdown-number"></div></div>
            <div id="progress-dots"></div>
            <div id="photo-sidebar"></div>
            <div id="no-camera" style="display:none;color:#fff;text-align:center;z-index:5;">
                <div style="font-size:2.5rem;">📷</div>
                <p>Không thể truy cập camera</p>
                <button onclick="initCamera()" style="margin-top:12px;background:#8b5cf6;color:#fff;border:none;padding:10px 20px;border-radius:20px;">🔄 Thử lại</button>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <div class="row" style="justify-content: space-between; font-weight: 600; color: var(--text-light); font-size: 0.8rem;">
                <span>📐 Layout</span>
                <span>⏱ Đếm ngược</span>
                <span>🖼 Chọn khung</span>
            </div>
            <div class="row">
                <select id="layout-select">
                    <option value="2">1×2 Strips</option>
                    <option value="4" selected>1×4 Strips</option>
                    <option value="4grid">2×2 Grid</option>
                    <option value="6grid">2×3 Grid</option>
                </select>
                <select id="countdown-select">
                    <option value="3" selected>3 giây</option>
                    <option value="5">5 giây</option>
                    <option value="10">10 giây</option>
                </select>
                <select id="frame-select">
                    <option value="white">Viền trắng</option>
                    <option value="polaroid">Polaroid</option>
                    <option value="film">Film</option>
                </select>
            </div>
            <div class="row" style="margin-top: 4px;">
                <button class="btn-icon" id="btn-beauty" title="Làm đẹp">💖</button>
                <button class="btn-main" id="btn-capture">📸 CHỤP</button>
                <button class="btn-icon" id="btn-history">🖼️</button>
            </div>
            <div class="row" style="gap:6px;">
                <button class="btn-outline btn-sm" id="btn-backgrounds">🎨 Nền</button>
                <button class="btn-outline btn-sm" id="btn-stickers">⭐ Sticker</button>
                <button class="btn-outline btn-sm" id="btn-text">✏️ Chữ</button>
                <button class="btn-outline btn-sm" id="btn-filters">🔮 Filter</button>
            </div>
        </div>

        <!-- Panels -->
        <div class="panel" id="bg-panel">
            <h3>🎨 Chọn nền Korean-style</h3>
            <div class="grid" id="bg-grid"></div>
            <label style="display:block;text-align:center;margin-top:12px;cursor:pointer;color:var(--primary);font-weight:500;">
                📁 Tải nền của bạn
                <input type="file" accept="image/*" id="custom-bg-input" style="display:none;">
            </label>
        </div>
        <div class="panel" id="sticker-panel">
            <h3>⭐ Sticker yêu thích</h3>
            <div class="grid small" id="sticker-grid"></div>
        </div>
        <div class="panel" id="text-panel">
            <h3>✏️ Thêm chữ vào ảnh</h3>
            <input type="text" id="text-input" placeholder="Nhập chữ..." style="width:100%;padding:10px;border-radius:20px;border:2px solid #e9e8f5;margin-bottom:8px;">
            <div class="row">
                <input type="color" id="text-color" value="#8b5cf6" style="width:40px;height:40px;border:none;border-radius:50%;">
                <button id="btn-add-text">✅ Thêm</button>
                <button id="btn-clear-text">🗑️ Xoá</button>
            </div>
        </div>
        <div class="panel" id="filter-panel">
            <h3>🔮 Bộ lọc máy ảnh</h3>
            <div class="grid" id="filter-grid"></div>
            <button style="margin-top:8px;width:100%;" id="btn-reset-filter">🔄 Reset bộ lọc</button>
        </div>
        <div id="history-panel">
            <h3 style="display:flex;justify-content:space-between;">🖼️ Lịch sử ảnh <button id="btn-close-history">✕</button></h3>
            <div class="history-grid" id="history-grid"></div>
        </div>

        <!-- Result Modal -->
        <div id="result-modal">
            <img id="result-image" src="" alt="Kết quả">
            <div class="actions">
                <button class="btn-download" id="btn-save-download">💾 Lưu & Tải</button>
                <button class="btn-retake" id="btn-retake">🔄 Chụp lại</button>
                <button class="btn-close" id="btn-close-result">✕ Đóng</button>
            </div>
        </div>
        <div id="overlay-backdrop"></div>
        <div id="toast"></div>
    </div>

    <script>
        (() => {
            // DOM helpers
            const $ = s => document.querySelector(s);
            const $$ = s => document.querySelectorAll(s);
            const video = $('#video');
            const previewCanvas = $('#preview-canvas');
            const previewCtx = previewCanvas.getContext('2d');
            const flash = $('#flash');
            const countdownOverlay = $('#countdown-overlay');
            const countdownNumber = $('#countdown-number');
            const progressDots = $('#progress-dots');
            const beautyIndicator = $('#beauty-indicator');
            const noCameraDiv = $('#no-camera');
            const resultModal = $('#result-modal');
            const resultImage = $('#result-image');
            const overlayBackdrop = $('#overlay-backdrop');
            const toast = $('#toast');
            const historyPanel = $('#history-panel');
            const historyGrid = $('#history-grid');
            const photoSidebar = $('#photo-sidebar');
            const btnCapture = $('#btn-capture');
            const btnBeauty = $('#btn-beauty');

            // State
            let cameraStream = null;
            let beautyEnabled = true;
            let selectedBg = null;
            let currentFilter = 'none';
            let stickersOnPhoto = [];
            let textsOnPhoto = [];
            let capturedFrames = [];
            let isCapturing = false;
            let animationId = null;
            let stickerIdCounter = 0,
                textIdCounter = 0;
            let currentStripDataUrl = null;
            let retakeMode = false;
            let retakeFrameIndex = null;
            const MAX_HISTORY = 10;
            const HISTORY_KEY = 'gockyniem_history';

            // ==================== CAMERA & PREVIEW ====================
            async function initCamera() {
                noCameraDiv.style.display = 'none';
                video.style.display = 'block';
                previewCanvas.style.display = 'block';
                try {
                    if (cameraStream) {
                        cameraStream.getTracks().forEach(t => t.stop());
                        cameraStream = null;
                    }
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
                        audio: false
                    });
                    cameraStream = stream;
                    video.srcObject = stream;
                    await video.play();
                    startPreviewLoop();
                    showToast('📷 Camera sẵn sàng');
                } catch (err) {
                    video.style.display = 'none';
                    previewCanvas.style.display = 'none';
                    noCameraDiv.style.display = 'flex';
                    if (err.name === 'NotAllowedError') noCameraDiv.querySelector('p').textContent =
                        'Bạn chưa cấp quyền camera. Vui lòng cho phép trong cài đặt.';
                    else if (err.name === 'NotFoundError') noCameraDiv.querySelector('p').textContent =

            function startPreviewLoop() {
                if (animationId) cancelAnimationFrame(animationId);
                const loop = () => {
                    if (!cameraStream || video.readyState < 2) {
                        animationId = requestAnimationFrame(loop);
                        return;
                    }
                    const w = video.videoWidth || 640,
                        h = video.videoHeight || 480;
                    if (previewCanvas.width !== w || previewCanvas.height !== h) {
                        previewCanvas.width = w;
                        previewCanvas.height = h;
                    }
                    previewCtx.clearRect(0, 0, w, h);
                    // Lật ngang để camera không bị ngược
                    previewCtx.save();
                    previewCtx.translate(w, 0);
                    previewCtx.scale(-1, 1);
                    previewCtx.filter = beautyEnabled ? 'blur(0.8px) brightness(1.08) contrast(1.04) saturate(1.1)' :
                        'none';
                    previewCtx.drawImage(video, 0, 0, w, h);
                    previewCtx.restore();
                    previewCtx.filter = 'none';
                    if (currentFilter !== 'none') {
                        previewCtx.filter = currentFilter;
                        previewCtx.drawImage(previewCanvas, 0, 0, w, h);
                        previewCtx.filter = 'none';
                    }
                    animationId = requestAnimationFrame(loop);
                };
                loop();

            // ==================== SOUND & EFFECTS ====================
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            function playShutterSound() {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(1100, now);
                osc1.frequency.exponentialRampToValueAtTime(700, now + 0.05);
                gain1.gain.setValueAtTime(0.25, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
                osc1.connect(gain1).connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.07);
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(1300, now + 0.09);
                osc2.frequency.exponentialRampToValueAtTime(900, now + 0.14);
                gain2.gain.setValueAtTime(0.2, now + 0.09);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
                osc2.connect(gain2).connect(audioCtx.destination);
                osc2.start(now + 0.09);
                osc2.stop(now + 0.16);
            }

            function triggerFlash() {

            function countdown(seconds) {
                return new Promise(resolve => {
                    let remaining = seconds;
                    countdownOverlay.classList.add('active');
                    const tick = () => {
                        if (remaining <= 0) {
                            countdownNumber.textContent = '';
                            countdownOverlay.classList.remove('active');
                            resolve();
                            return;
                        }
                        countdownNumber.textContent = remaining;
                        countdownNumber.style.animation = 'none';
                        void countdownNumber.offsetWidth;
                        countdownNumber.style.animation = 'countBounce 0.6s ease-out';
                        remaining--;
                        setTimeout(tick, 800);
                    };
                    tick();
                });
            }

            // ==================== CAPTURE FRAME ====================
            async function captureFrame(applyBg = false) {
                if (!video.videoWidth || !video.videoHeight) return null;
                const w = video.videoWidth,
                    h = video.videoHeight;
                const offCanvas = document.createElement('canvas');
                offCanvas.width = w;
                offCanvas.height = h;
                const ctx = offCanvas.getContext('2d');
                // Lật ngang để ảnh chụp không bị ngược
                ctx.save();
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
                ctx.filter = beautyEnabled ? 'blur(0.8px) brightness(1.08) contrast(1.04) saturate(1.1)' : 'none';
                ctx.drawImage(video, 0, 0, w, h);
                ctx.restore();
                ctx.filter = 'none';
                if (currentFilter !== 'none') {
                    ctx.filter = currentFilter;
                    ctx.drawImage(offCanvas, 0, 0, w, h);
                    ctx.filter = 'none';
                }
                if (applyBg && selectedBg) {
                    const bgCanvas = document.createElement('canvas');
                    bgCanvas.width = w;
                    bgCanvas.height = h;
                    const bgCtx = bgCanvas.getContext('2d');
                    if (selectedBg.startsWith('data:') || selectedBg.startsWith('blob:')) {
                        return new Promise(resolve => {
                            const img = new Image();
                            img.src = selectedBg;
                            img.onload = () => {
                                bgCtx.drawImage(img, 0, 0, w, h);
                                bgCtx.globalAlpha = 0.9;
                                bgCtx.drawImage(offCanvas, 0, 0, w, h);
                                resolve(bgCanvas.toDataURL('image/jpeg', 0.9));
                            };
                            img.onerror = () => resolve(offCanvas.toDataURL('image/jpeg', 0.9));
                        });
                    } else {
                        bgCtx.fillStyle = selectedBg;
                        bgCtx.fillRect(0, 0, w, h);
                        bgCtx.globalAlpha = 0.9;
                        bgCtx.drawImage(offCanvas, 0, 0, w, h);
                        return bgCanvas.toDataURL('image/jpeg', 0.9);
                    }
                }
                return offCanvas.toDataURL('image/jpeg', 0.9);
            }

            // ==================== CREATE PHOTO STRIP ====================
            async function createPhotoStrip(frames, layoutType) {
                const photoW = 600,
                    photoH = 450,
                    pad = 20;
                let cols, rows;
                if (layoutType === '2') { cols = 1;
                    rows = 2; } else if (layoutType === '4') { cols = 1;
                    rows = 4; } else if (layoutType === '4grid') { cols = 2;
                    rows = 2; } else if (layoutType === '6grid') { cols = 2;
                    rows = 3; } else { cols = 1;
                    rows = frames.length; }
                const stripW = cols * photoW + (cols + 1) * pad;
                const stripH = rows * photoH + (rows + 1) * pad + 140;
                const canvas = document.createElement('canvas');
                canvas.width = stripW;
                canvas.height = stripH;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, stripW, stripH);
                for (let i = 0; i < frames.length; i++) {
                    const col = i % cols,
                        row = Math.floor(i / cols);
                    const x = pad + col * (photoW + pad),
                        y = pad + row * (photoH + pad);
                    const frameType = $('#frame-select').value;
                    if (frameType === 'polaroid') {
                        ctx.fillStyle = '#f4f2ff';
                        ctx.fillRect(x - 6, y - 6, photoW + 12, photoH + 40);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x, y, photoW, photoH);
                    } else if (frameType === 'film') {
                        ctx.fillStyle = '#1e1b2e';
                        ctx.fillRect(x - 4, y - 4, photoW + 8, photoH + 8);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x, y, photoW, photoH);
                    } else {
                        ctx.fillStyle = '#f4f2ff';
                        ctx.fillRect(x - 2, y - 2, photoW + 4, photoH + 4);
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x, y, photoW, photoH);
                    }
                    const img = await loadImage(frames[i]);
                    ctx.drawImage(img, x, y, photoW, photoH);
                }
                ctx.fillStyle = '#9ca3af';
                ctx.font = '600 15px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText(new Date().toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit' }), stripW / 2, stripH - 90);
                ctx.fillStyle = 'rgba(107,114,128,0.5)';
                ctx.font = 'italic 12px "Segoe UI"';
                ctx.fillText('code web by Ducanh • donate: 0915779767 (MB BANK)', stripW / 2, stripH - 65);
                return canvas.toDataURL('image/jpeg', 0.92);
            }

            // ==================== INDEXEDDB STORAGE ====================
            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('PhotoBoothDB', 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('history')) db.createObjectStore('history', { keyPath: 'id' });
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async function saveToHistory(dataUrl) {
                try {
                    const db = await openDB();
                    const tx = db.transaction('history', 'readwrite');
                    const store = tx.objectStore('history');
                    const entry = { id: Date.now(), dataUrl, date: new Date().toISOString() };
                    store.add(entry);
                    const countRequest = store.count();
                    countRequest.onsuccess = () => {
                        if (countRequest.result > MAX_HISTORY) {
                            const cursorRequest = store.openCursor(null, 'next');
                            cursorRequest.onsuccess = (e) => {
                                const cursor = e.target.result;
                                if (cursor && countRequest.result > MAX_HISTORY) {
                                    cursor.delete();
                                    countRequest.result--;
                                    cursor.continue();
                                }
                            };
                        }
                    };
                    await tx.complete;
                } catch (e) {
                    console.warn('IndexedDB failed, fallback localStorage');
                    try {
                        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                        history.unshift({ id: Date.now(), dataUrl, date: new Date().toISOString() });
                        if (history.length > MAX_HISTORY) history.pop();
                        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                    } catch {}
                }
            }

            async function loadHistory() {
                historyGrid.innerHTML = '';
                try {
                    const db = await openDB();
                    const tx = db.transaction('history', 'readonly');
                    const store = tx.objectStore('history');
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const history = request.result || [];
                        if (history.length === 0) {
                            historyGrid.innerHTML =
                                '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#9ca3af;">📭 Chưa có ảnh nào</div>';
                            return;
                        }
                        history.reverse().forEach((entry) => {
                            renderHistoryItem(entry);
                        });
                    };
                } catch {
                    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                    if (!history.length) historyGrid.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:30px;">📭 Chưa có ảnh</div>';
                    else history.forEach(entry => renderHistoryItem(entry));
                }
            }

            async function deleteHistoryEntry(id) {

            function makeDraggable(el, obj) {
                let startX, startY, initLeft, initTop;
                el.addEventListener('pointerdown', e => {
                    e.preventDefault();
                    startX = e.clientX;
                    startY = e.clientY;
                    initLeft = parseFloat(el.style.left) || 0;
                    initTop = parseFloat(el.style.top) || 0;
                    el.setPointerCapture(e.pointerId);
                    const move = ev => {
                        const dx = ev.clientX - startX,
                            dy = ev.clientY - startY;
                        const cw = el.parentNode.clientWidth,
                            ch = el.parentNode.clientHeight;
                        const nl = Math.max(0, Math.min(85, initLeft + (dx / cw) * 100));
                        const nt = Math.max(0, Math.min(85, initTop + (dy / ch) * 100));
                        el.style.left = nl + '%';
                        el.style.top = nt + '%';
                        obj.x = nl;
                        obj.y = nt;
                    };
                    const up = () => {
                        el.removeEventListener('pointermove', move);
                        el.removeEventListener('pointerup', up);
                    };
                    el.addEventListener('pointermove', move);
                    el.addEventListener('pointerup', up);
                });
            }

                { name: 'Canon 5D', filter: 'saturate(1.2) brightness(1.08) contrast(1.02)' },
                { name: 'Fuji Classic', filter: 'sepia(0.2) contrast(1.05) brightness(0.95)' },
                { name: 'Sony A7', filter: 'brightness(1.12) saturate(1.1) contrast(1.04)' },
                { name: 'Vintage Film', filter: 'sepia(0.3) brightness(0.9) contrast(1.1)' },
                { name: 'Pastel Dream', filter: 'brightness(1.1) saturate(1.3) blur(0.4px)' },
                { name: 'Mint Cool', filter: 'hue-rotate(15deg) brightness(1.05) saturate(0.9)' },
            ];

            function buildFilterGrid() {
                const grid = $('#filter-grid');
                grid.innerHTML = '';
                filterPresets.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'grid-item';
                    div.textContent = f.name;
                    div.style.fontSize = '0.7rem';
                    div.style.fontWeight = '600';
                    if (currentFilter === f.filter) div.classList.add('selected');
                    div.addEventListener('click', () => {
                        $$('#filter-grid .grid-item').forEach(d => d.classList.remove('selected'));
                        div.classList.add('selected');
                        currentFilter = f.filter;
                        closeAllPanels();
                    });
                    grid.appendChild(div);
                });
            }

            function resetFilter() {
                currentFilter = 'none';
                $$('#filter-grid .grid-item').forEach(d => d.classList.remove('selected'));
                showToast('🔄 Đã reset bộ lọc');
            }

            // ==================== EVENT LISTENERS ====================
            btnCapture.addEventListener('click', startPhotoCapture);
            btnBeauty.addEventListener('click', toggleBeauty);
            $('#btn-history').addEventListener('click', () => {
                closeAllPanels();
                loadHistory();
                historyPanel.classList.add('open');
                overlayBackdrop.classList.add('show');
            });
            $('#btn-close-history').addEventListener('click', () => {
                historyPanel.classList.remove('open');
                overlayBackdrop.classList.remove('show');
            });
            overlayBackdrop.addEventListener('click', closeAllPanels);
            $('#btn-backgrounds').addEventListener('click', () => openPanel('#bg-panel'));
            $('#btn-stickers').addEventListener('click', () => openPanel('#sticker-panel'));
            $('#btn-text').addEventListener('click', () => openPanel('#text-panel'));
            $('#btn-filters').addEventListener('click', () => openPanel('#filter-panel'));
            $('#btn-add-text').addEventListener('click', () => {
                const text = $('#text-input').value.trim();
                const color = $('#text-color').value;
                if (text) { addText(text, color);
                    $('#text-input').value = ''; }
            });
            $('#btn-clear-text').addEventListener('click', () => {
                textsOnPhoto = [];
                renderTexts();
                showToast('🗑️ Đã xoá chữ');
            });
            $('#btn-reset-filter').addEventListener('click', resetFilter);
            $('#custom-bg-input').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    selectedBg = ev.target.result;
                    $$('#bg-grid .grid-item').forEach(d => d.classList.remove('selected'));
                    closeAllPanels();
                };
                reader.readAsDataURL(file);
            });
            $('#btn-save-download').addEventListener('click', saveAndDownload);
            $('#btn-retake').addEventListener('click', retakeSession);
            $('#btn-close-result').addEventListener('click', hideResult);
            resultModal.addEventListener('click', e => {
                if (e.target === resultModal) hideResult();
            });

            // Keyboard shortcut
            document.addEventListener('keydown', e => {
                if (e.key === ' ' && !isCapturing && document.activeElement === document.body) {
                    e.preventDefault();
                    btnCapture.click();
                }
                if (e.key === 'Escape') {
                    hideResult();
                    closeAllPanels();
                }
            });

            window.addEventListener('beforeunload', stopCamera);

            // ==================== INIT ====================
            initCamera();
            buildBgGrid();
            buildStickerGrid();
            buildFilterGrid();
            beautyIndicator.classList.add('active');
        })();
    </script>
</body>
</html>
